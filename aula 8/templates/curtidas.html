<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Curtidas</title>
    <link rel="stylesheet" href="/static/styles.css">
    
    <style>
        .contador-container {
            margin: 50px auto;
            padding: 30px;
            background: #2b2b2b;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            border: 2px solid #333;
        }
        .numero {
            font-size: 64px;
            font-weight: bold;
            color: #4fa4ff;
            display: block;
            margin: 20px 0;
        }
        .btn-acao {
            background-color: #4fa4ff;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-acao:hover { background-color: #3b8ce0; }
        .btn-zerar { background-color: #ff4f4f; }
        .btn-zerar:hover { background-color: #e03b3b; }
    </style>
</head>
<body>
    {% include '_tabs_state.html' %}
    
    <div class="contador-container">
        <h2 style="color: #e0e0e0; margin-top: 0;">Total de Curtidas</h2>
        
        <span id="contador-curtidas" class="numero">{{ curtidas }}</span>
        
        <button class="btn-acao" 
                hx-post="/curtir?acao=incrementar" 
                hx-target="#contador-curtidas" 
                hx-swap="outerHTML">👍 Curtir</button>
        
        <button class="btn-acao btn-zerar" 
                hx-post="/curtir?acao=zerar" 
                hx-target="#contador-curtidas" 
                hx-swap="outerHTML"
                hx-confirm="Tem certeza que deseja retirar todas as curtidas?">🗑️ Zerar</button>
    </div>
</body>
</html>
