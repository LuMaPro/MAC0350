<!-- 

Desafio 1: O Interruptor (Modo Claro/Escuro simples)
Cenário: Crie um botão e um texto que diz "A luz está APAGADA".

Requisitos:

Crie uma função chamada alternarLuz() e coloque no onclick do botão.
Use document.querySelector para pegar o texto.
Use uma condicional (if e ===). Se o texto for "A luz está APAGADA", mude para "A luz está ACESA". 
                                Se não, mude de volta para "A luz está APAGADA".

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="on">
        <span>A luz está ACESA</span>
        <button onclick="alternarLuz()"></button>
    </main>
    <script>
        function alternarLuz(){
            let main = document.querySelector('main')
            let button = document.querySelector('button')
            let span = document.querySelector('span')
            let text = span.innerText
            if(text === 'A luz está ACESA'){
                main.classList.remove('on')
                main.classList.add('off')
                span.innerText = 'A luz está APAGADA'
            }
            else{
                main.classList.remove('off')
                main.classList.add('on')
                span.innerText = 'A luz está ACESA'
            }
        }
    </script>
</body>
</html>
