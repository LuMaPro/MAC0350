<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .fade-out.htmx-swapping {
            opacity: 0;
            transition: opacity 1s ease-out;
        }
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline;
        }
        .htmx-request.htmx-indicator {
            display: inline;
        }
        body { font-family: sans-serif; padding: 20px; }
        button { margin: 5px; cursor: pointer; }
    </style>
</head>
<body class="fade-out">
    <h1>Meu Site</h1>
    <p>Bem vindo ao meu site!</p>
    
    <nav>
        <button hx-get="/lista" hx-target="main">
            Lista de alunos
        </button>
        <button hx-get="/editarAlunos" hx-target="main">
            Editar lista de alunos
        </button>
        <button hx-delete="/apagar"
                hx-target="body"
                id="apagar"
                hx-swap="outerHTML swap:1s">
            Deletar site
        </button>
    </nav>
    <hr>
    
    <main hx-get="/lista" hx-target="main" hx-trigger="load">
        </main>

    <script>
        document.getElementById("apagar").addEventListener("htmx:confirm", (e) => {
            e.preventDefault()
            Swal.fire({
                title: "Prosseguir?",
                text: "Deseja deletar meu site?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sim, deletar o site",
                cancelButtonText: "Cancelar"
            }).then(result => {
                if (result.isConfirmed) {
                    e.detail.issueRequest(true);
                }
            })
        })
    </script>
</body>
</html>
